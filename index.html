<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>¡Cumpleaños de Américo Alexander!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Fredoka+One&family=Chewy&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --azul-oscuro: #1B5E9E;
      --azul-medio: #2E8BDB;
      --azul-claro: #6BB8FF;
      --azul-pastel: #B8E0FF;
      --naranja-oscuro: #E86A1F;
      --naranja-medio: #FF8C42;
      --naranja-claro: #FFB366;
      --naranja-pastel: #FFD9B3;
      --amarillo: #FFE066;
      --amarillo-claro: #FFF5CC;
      --crema: #FFF9F0;
      --blanco: #FFFFFF;
      --celeste-fondo: #E8F4FD;
      --texto: #2D4059;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background-image: url(fondo\ toystoryreal.png);
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      background-color: #6BB8FF;
      color: var(--texto);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── FONDO INFANTIL CON PUNTOS Y ESTRELLAS ── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(circle at 10% 20%, var(--azul-pastel) 3px, transparent 3px),
        radial-gradient(circle at 30% 60%, var(--naranja-medio) 4px, transparent 4px),
        radial-gradient(circle at 70% 30%, var(--amarillo) 3px, transparent 3px),
        radial-gradient(circle at 85% 80%, var(--azul-claro) 5px, transparent 5px),
        radial-gradient(circle at 50% 50%, var(--blanco) 3px, transparent 3px),
        radial-gradient(circle at 15% 85%, var(--amarillo) 4px, transparent 4px),
        radial-gradient(circle at 90% 10%, var(--azul-claro) 3px, transparent 3px),
        radial-gradient(circle at 40% 90%, var(--amarillo) 5px, transparent 5px),
        radial-gradient(circle at 65% 15%, var(--celeste-fondo) 3px, transparent 3px),
        radial-gradient(circle at 25% 40%, var(--azul-pastel) 4px, transparent 4px);
      background-size: 200px 200px;
      z-index: -1;
      pointer-events: none;
      opacity: 0.45;
    }

    /* ── COVER PAGE ── */
    body.cover-active {
      overflow: hidden !important;
      height: 100vh !important;
      touch-action: none !important;
    }
    #cover {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--celeste-fondo);
      user-select: none;
      overflow: hidden;
      z-index: 1000;
    }
    #cover img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      opacity: 1 !important;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    #cover:hover img {
      opacity: 1 !important;
    }
    #cover .tap-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: clamp(0.85rem, 2.5vw, 1.2rem);
      letter-spacing: 0.15em;
      color: var(--naranja-oscuro);
      text-transform: uppercase;
      white-space: nowrap;
      animation: blink 2s ease-in-out infinite;
      z-index: 2;
      text-shadow: 0 2px 10px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.8);
      padding: 8px 20px;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }
    @keyframes blink {
      0%,100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── CONTENT (hidden until cover clicked) ── */
    #content {
      display: none;
      opacity: 0;
      transition: opacity 1s ease;
      background: transparent;
    }
    #content.visible {
      opacity: 1;
    }

    /* ─── FUENTES INFANTILES ─── */
    .font-titulo {
      font-family: 'Fredoka One', cursive;
    }
    .font-cursiva {
      font-family: 'Chewy', cursive;
    }
    .font-texto {
      font-family: 'Baloo 2', cursive;
    }

    /* ══════════════════════════════════════════
       ADORNOS DE ESQUINA (globos, etc.)
    ══════════════════════════════════════════ */
    .corner-decor {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .corner-decor.visible { opacity: 1; }

    /* ══════════════════════════════════════════
       VARIABLE PARA AJUSTAR TAMAÑO DE ADORNOS
       Cambia --adorno-size para agrandar/rebajar
    ══════════════════════════════════════════ */
    :root {
      --adorno-size: 10000px;  
    }

    .corner-tl  { top: 0px;  left: -10px;  width: clamp(120px, 18vw, var(--adorno-size)); }
    .corner-tr  { top: 0px;  right: -10px; width: clamp(120px, 18vw, var(--adorno-size)); }
    .corner-bl  { bottom: -15px; left: -10px;  width: clamp(120px, 18vw, var(--adorno-size)); }
    .corner-br  { bottom: 50px; right: -10px; width: clamp(120px, 18vw, var(--adorno-size)); }

    section { position: relative; overflow: visible; }

    
    /* ══════════════════════════════════════════
       SECCIÓN 1: HERO / BIENVENIDA
    ══════════════════════════════════════════ */
    .hero-section {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      padding: clamp(4rem, 10vw, 7rem) 0 clamp(4rem, 10vw, 7rem);
    }

    /* ── imágenes flotantes alrededor ── */
    .hero-float {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
      animation: floatImg 3.5s ease-in-out infinite;
    }
    .hero-float:nth-child(2)  { animation-delay: 0s;    }
    .hero-float:nth-child(3)  { animation-delay: 0.7s;  }
    .hero-float:nth-child(4)  { animation-delay: 1.4s;  }
    .hero-float:nth-child(5)  { animation-delay: 0.3s;  }
    .hero-float:nth-child(6)  { animation-delay: 1.0s;  }
    .hero-float:nth-child(7)  { animation-delay: 1.7s;  }
    .hero-float:nth-child(8)  { animation-delay: 0.5s;  }
    @keyframes floatImg {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50%      { transform: translateY(-14px) rotate(3deg); }
    }

/* Contenedor padre - DEBE tener position: relative */
.photo-section, .hero-section {
  position: relative; /* ← IMPORTANTE */
}

/* Imágenes flotantes - TODAS con position: absolute */
.hf-tl  { 
  position: absolute;
  top: 45%;   
  left: -20px;    
  width: 180px;  /* ← Tamaño fijo primero para probar */
  z-index: 1;
}

.hf-tr  { 
  position: absolute;
  top: 55%;   
  right: -20px;   
  width: 180px;
  transform: scaleX(-1); 
  z-index: 1;
}

.hf-ml  { 
  position: absolute;
  top: 20%;  
  left: -10px;    
  width: 160px;
  z-index: 1;
}

.hf-mr  { 
  position: absolute;
  top: 30%;  
  right: -10px;   
  width: 160px;
  transform: scaleX(-1); 
  z-index: 1;
}

.hf-bl  { 
  position: absolute;
  bottom: 15%; 
  left: -15px;   
  width: 180px;
  transform: scaleY(-1); 
  z-index: 1;
}

.hf-br  { 
  position: absolute;
  bottom: 15%; 
  right: -15px;  
  width: 180px;
  transform: scale(-1); 
  z-index: 1;
}

/* Responsive - Móvil */
@media (max-width: 768px) {
  .hf-tl, .hf-tr, .hf-bl, .hf-br {
    width: 140px !important;
  }
  .hf-ml, .hf-mr {
    width: 120px !important;
  }
}
    
    /* ══════════════════════════════════════════
       SECCIÓN 1: FOTO / IMAGEN TOY STORY
    ══════════════════════════════════════════ */
    .photo-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 5rem) clamp(1rem, 4vw, 2rem);
      position: relative;
    }
    .img-toy-story {
      width: 100vw;
      max-width: 100vw;
      height: auto;
      object-fit: contain;
      object-position: center top;
      display: block;
      margin: 0 auto 1rem;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .hero-inner {
      position: relative;
      width: 100%;
      max-width: 100%;
      z-index: 2;
      text-align: center;
      overflow: visible;
    }

    .hero-birthday-number {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(7rem, 20vw, 12rem);
      color: var(--blanco);
      text-align: center;
      display: block;
      width: 100%;
      margin-bottom: 0.1rem;
      text-shadow: 3px 4px 0px var(--azul-oscuro), 6px 7px 0px rgba(255, 205, 175, 0.2);
      line-height: 1;
      -webkit-text-stroke: 2px var(--azul-oscuro);
    }

    .hero-birthday-label {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: var(--azul-oscuro);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0px var(--azul-pastel);
    }

    .hero-name {
      font-family: 'Chewy', cursive;
      font-size: clamp(3rem, 8vw, 4rem);
      color: var(--blanco);
      text-align: center;
      display: block;
      width: 100%;
      margin-bottom: 0.3rem;
      text-shadow: 2px 3px 0px var(--azul-oscuro);
    }

    .hero-apellido {
      font-family: 'Chewy', sans-serif;
      font-weight: 600;
      font-size: clamp(2.6rem, 4vw, 2rem);
      color: var(--blanco);
      letter-spacing: 0.05em;
      text-shadow: 2px 3px 0px var(--azul-oscuro);
    }

    .hero-text {
      text-align: center;
      margin-top: 1.5rem;
      padding: 0 0.5rem;
    }
     .parents-section {
      padding: clamp(3rem, 8vw, 6rem) clamp(1rem, 5vw, 2rem);
      position: relative;
      overflow: hidden;
    }


      .parents-container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }


   .parents-photo-frame {
      position: relative;
      max-width: 420px;
      margin: 0 auto 2rem;
      padding: 30px;
      background: var(--blanco);
      border-radius: 24px;
      box-shadow: 0 15px 50px rgba(139,111,78,0.15);
    }
    .parents-photo-frame::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 2px solid var(--rosa-palo);
      border-radius: 18px;
      pointer-events: none;
    }
    .parents-photo {
      width: 100%;
      border-radius: 16px;
      object-fit: cover;
      aspect-ratio: 4/5;
      display: block;
    }
    /* ══════════════════════════════════════════
       CUENTA REGRESIVA
    ══════════════════════════════════════════ */
    .countdown-section {
      padding: clamp(2.5rem, 6vw, 5rem) clamp(1rem, 4vw, 2rem);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .countdown-container { max-width: 900px; margin: 0 auto; position: relative; z-index: 2; }
    .countdown-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--blanco);
      margin-bottom: 1.5rem;
      text-shadow: 2px 2px 0px var(--azul-oscuro);
    }
    .countdown-grid {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(0.4rem, 2vw, 1.2rem);
      flex-wrap: nowrap;
    }
    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: clamp(55px, 15vw, 100px);
      background: var(--blanco);
      border-radius: 20px;
      padding: 0.8rem 0.5rem;
      box-shadow: 0 5px 20px rgba(27,94,158,0.1);
      border: 3px solid var(--azul-oscuro);
    }
    .countdown-number {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.5rem, 10vw, 5rem);
      color: var(--amarillo);
      line-height: 1;
      display: block;
      text-shadow: 2px 2px 0px var(--naranja-oscuro);
    }
    .countdown-label {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: var(--azul-medio);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .countdown-separator {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7vw, 4rem);
      color: var(--naranja-claro);
      margin-bottom: 1.2rem;
    }

    /* ══════════════════════════════════════════
       FECHA Y HORA
    ══════════════════════════════════════════ */
    .datetime-section {
      padding: clamp(2.5rem, 6vw, 5rem) clamp(1rem, 4vw, 2rem);
      position: relative;
      overflow: hidden;
    }
    .datetime-container {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
      gap: 1.5rem;
      position: relative;
      z-index: 2;
    }
    .datetime-card {
      background: var(--blanco);
      padding: clamp(1.5rem, 4vw, 2.5rem);
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(27,94,158,0.12);
      border: 4px solid var(--azul-claro);
      position: relative;
    }
    .datetime-card::after {
      content: '';
      position: absolute;
      top: -8px; right: -8px;
      width: 30px; height: 30px;
      background: var(--naranja-claro);
      border-radius: 50%;
      opacity: 0.5;
    }
    .datetime-label {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: var(--amarillo);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
    }
    .datetime-value {
      font-family: 'Chewy', cursive;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--azul-claro);
    }

    /* ══════════════════════════════════════════
       LUGAR
    ══════════════════════════════════════════ */
    .location-section {
      padding: clamp(3rem, 8vw, 6rem) clamp(1rem, 4vw, 2rem);
      position: relative;
      overflow: hidden;
    }
    .location-container {
      max-width: 680px;
      margin: 0 auto;
      background: var(--blanco);
      padding: clamp(1.8rem, 5vw, 3rem);
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(27,94,158,0.1);
      position: relative;
      z-index: 2;
      border: 4px dashed var(--amarillo);
    }
    .location-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      color: var(--naranja-claro);
      margin-bottom: 1.5rem;
    }
    .location-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      color: var(--azul-medio);
      margin-bottom: 1.2rem;
    }
    .location-address {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: var(--texto);
      margin-bottom: 2rem;
      line-height: 1.8;
      font-weight: 500;
    }
    .location-btn {
      display: inline-block;
      padding: clamp(0.7rem, 2.5vw, 1rem) clamp(1.5rem, 5vw, 2.5rem);
      background: linear-gradient(135deg, var(--azul-claro) 0%, var(--azul-medio) 100%);
      color: var(--blanco);
      text-decoration: none;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 1.5rem;
      border: 3px solid var(--blanco);
      box-shadow: 0 5px 15px rgba(27,94,158,0.3);
    }
    .location-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(27,94,158,0.4);
    }

    /* Mapa iframe */
    .map-wrapper {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(27,94,158,0.15);
      border: 4px solid var(--azul-pastel);
    }
    .map-wrapper iframe {
      width: 100%;
      height: 350px;
      border: none;
      display: block;
    }

   


    /* ══════════════════════════════════════════
       RESPONSIVE — MÓVIL PRIMERO
    ══════════════════════════════════════════ */

    /* ── ≤ 768px ── */
    @media (max-width: 768px) {
      .hero-section { padding: 3rem 0 3rem; }

      /* Imagen principal ENORME en móvil */
      .img-toy-story {
        width: 100vw !important;
        max-width: 100vw !important;
      }

      /* Texto nombre más grande */
      .hero-name    { font-size: clamp(2.8rem, 10vw, 4.5rem); }
      .hero-apellido{ font-size: clamp(2.2rem, 8vw, 3.5rem); }
      .hero-text p  { font-size: clamp(1.5rem, 5.5vw, 2rem); }

      /* Imágenes flotantes más grandes en móvil */
      .hf-tl, .hf-tr { width: clamp(110px, 28vw, 220px); }
      .hf-ml, .hf-mr { width: clamp(95px, 24vw, 190px); }
      .hf-bl, .hf-br { width: clamp(110px, 28vw, 220px); }
      .hf-tc, .hf-bc { width: clamp(75px, 18vw, 140px); }

      /* Adornos de esquina más grandes */
      .corner-decor  { width: clamp(100px, 26vw, 180px) !important; }

      /* Countdown más compacto pero legible */
      .countdown-grid    { gap: 0.4rem; flex-wrap: nowrap; }
      .countdown-item    { min-width: clamp(62px, 18vw, 95px); padding: 0.7rem 0.3rem; }
      .countdown-number  { font-size: clamp(2.4rem, 11vw, 4rem); }
      .countdown-label   { font-size: clamp(0.65rem, 2.2vw, 0.85rem); }
      .countdown-separator { font-size: clamp(1.8rem, 7vw, 3.5rem); }

      /* Fecha/hora */
      .datetime-card  { padding: 1.8rem 1.2rem; }
      .datetime-value { font-size: clamp(1.8rem, 6vw, 2.6rem); }
      .datetime-label { font-size: clamp(1rem, 3.5vw, 1.3rem); }

      /* Lugar */
      .location-container { max-width: 96vw; padding: 1.8rem 1rem; }
      .location-title  { font-size: clamp(1.6rem, 6vw, 2.4rem); }
      .location-name   { font-size: clamp(1.1rem, 4.5vw, 1.6rem); }
      .location-address{ font-size: clamp(1rem, 4vw, 1.2rem); line-height: 2; }
      .map-wrapper iframe { height: 260px; }

      /* Footer */
      .footer-text { font-size: clamp(2rem, 7vw, 3rem); }
    }

    /* ── ≤ 480px ── */
    @media (max-width: 480px) {
      .img-toy-story { width: 100vw !important; max-width: 100vw !important; }

      .hf-tl, .hf-tr { width: clamp(95px, 30vw, 150px); }
      .hf-ml, .hf-mr { width: clamp(80px, 25vw, 130px); }
      .hf-bl, .hf-br { width: clamp(95px, 30vw, 150px); }
      .hf-tc, .hf-bc { width: clamp(60px, 18vw, 100px); }

      .corner-decor  { width: clamp(90px, 28vw, 150px) !important; }

      .countdown-item    { min-width: clamp(58px, 17vw, 85px); padding: 0.6rem 0.2rem; }
      .countdown-number  { font-size: clamp(2rem, 10.5vw, 3.5rem); }
      .countdown-separator { font-size: clamp(1.5rem, 6.5vw, 2.8rem); margin-bottom: 0.8rem; }

      .map-wrapper iframe { height: 220px; }
    }

    /* ── ≤ 360px ── */
    @media (max-width: 360px) {
      .countdown-number  { font-size: clamp(1.7rem, 9.5vw, 2.8rem); }
      .countdown-separator { font-size: clamp(1.2rem, 5.5vw, 2rem); }
      .corner-decor { width: clamp(70px, 24vw, 110px) !important; }
      .hf-tl,.hf-tr,.hf-bl,.hf-br { width: clamp(70px, 26vw, 110px); }
      .hf-ml,.hf-mr { width: clamp(60px, 22vw, 95px); }
    }

    /* ══════════════════════════════════════════
       BOTÓN DE MÚSICA FLOTANTE
    ══════════════════════════════════════════ */
    #musicToggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: 2.5px solid var(--azul-oscuro);
      box-shadow: 0 4px 14px rgba(27,94,158,0.25);
      cursor: pointer;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #musicToggle:active {
      transform: scale(0.92);
    }
    #musicToggle svg {
      width: 20px;
      height: 20px;
      fill: var(--azul-oscuro);
      display: block;
    }
    #musicToggle .icon-pause { display: block; }
    #musicToggle .icon-play  { display: none;  }
    #musicToggle.paused .icon-pause { display: none;  }
    #musicToggle.paused .icon-play  { display: block; }
  </style>
</head>
<body>



  <!-- ── COVER: the entire page 1 is a button ── -->
  <div id="cover">
    <img src="portada carta.png" alt="portada carta">
    <div class="tap-hint">Toca para abrir la invitación</div>
  </div>

  <!-- ── ALL CONTENT (shown after click, 1s fade) ── -->
  <div id="content">

    <!-- ═══════════════════════════════════════════════
         SECCIÓN 1: HERO / BIENVENIDA
    ═══════════════════════════════════════════════ -->
    <img src="toy story primera sección.png" alt="Personajes Toy Story" style="width:100%;display:block;margin:0;padding:0;">

     <section class="parents-section" id="sec-parents"></section>

 
          <div class="parents-photo-frame" data-aos="fade-down" data-aos-duration="1200">
        <img src="foto americo.png" alt="Miguel y Melissa" class="parents-photo">
      </div>

    <!-- ═══════════════════════════════════════════════
         CUENTA REGRESIVA
    ═══════════════════════════════════════════════ -->
    <section class="countdown-section" id="sec-countdown">

      <!-- Adornos de esquina -->

      <div class="countdown-container" data-aos="fade-down" data-aos-duration="1200">
        <h2 class="countdown-title font-titulo">Días faltantes</h2>

        <div class="countdown-grid">
          <div class="countdown-item" data-aos="fade-down" data-aos-delay="100">
            <span class="countdown-number font-titulo" id="dias">00</span>
            <span class="countdown-label font-texto">Días</span>
          </div>
          <div class="countdown-separator font-titulo">:</div>
          <div class="countdown-item" data-aos="fade-down" data-aos-delay="200">
            <span class="countdown-number font-titulo" id="horas">00</span>
            <span class="countdown-label font-texto">Horas</span>
          </div>
          <div class="countdown-separator font-titulo">:</div>
          <div class="countdown-item" data-aos="fade-down" data-aos-delay="300">
            <span class="countdown-number font-titulo" id="minutos">00</span>
            <span class="countdown-label font-texto">Min</span>
          </div>
          <div class="countdown-separator font-titulo">:</div>
          <div class="countdown-item" data-aos="fade-down" data-aos-delay="400">
            <span class="countdown-number font-titulo" id="segundos">00</span>
            <span class="countdown-label font-texto">Seg</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════
         FECHA Y HORA
    ═══════════════════════════════════════════════ -->
    <section class="datetime-section" id="sec-datetime">

      <!-- Adornos de esquina -->
      <img src="caballo.png" alt="pastel esquina superior izquierda" class="corner-decor corner-tl" id="c4-tl">
      <img src="estrella.png" alt="pastel esquina superior derecha" class="corner-decor corner-tr" id="c4-tr">
      <img src="globo esquina inferior.png" alt="pastel esquina inferior izquierda" class="corner-decor corner-bl" id="c4-bl">
      <img src="Slinky.png" alt="pastel esquina inferior derecha" class="corner-decor corner-br" id="c4-br">

      <div class="datetime-container">
        <div class="datetime-card" data-aos="fade-right" data-aos-duration="1000">
          <div class="datetime-label">Fecha</div>
          <div class="datetime-value">Sábado 16 de Mayo</div>
        </div>
        <div class="datetime-card" data-aos="fade-left" data-aos-duration="1000">
          <div class="datetime-label">Hora</div>
          <div class="datetime-value">3:00 PM</div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════
         LUGAR
    ═══════════════════════════════════════════════ -->
    <section class="location-section" id="sec-location">

      <!-- Adornos de esquina -->
      <img src="woody.png" alt="regalo esquina inferior izquierda" class="corner-decor corner-bl" id="c5-bl">
      <img src="buzz.png" alt="regalo esquina inferior derecha" class="corner-decor corner-br" id="c5-br">

      <div class="location-container" data-aos="fade-down" data-aos-duration="1200">
        <h2 class="location-title">Lugar del Evento</h2>
        <p class="location-name">Salón de Eventos Infantiles</p>
        <p class="location-address">
          Av. Franco Valle, Entre Av. Satélite y C.10<br>
          Edificio "Real", 4to Piso (con ascensor)<br>
          Cerca a juzgados, DD.RR, cruce Viacha
        </p>

        <!-- Mapa embebido -->
        <div class="map-wrapper">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d549.2506986020454!2d-68.16607217655141!3d-16.515791988643947!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x915edf004c4c9747%3A0x674157808b71889b!2sMolto%20divertido%20sal%C3%B3n%20de%20eventos%20infantiles!5e0!3m2!1ses-419!2sbo!4v1778680094364!5m2!1ses-419!2sbo" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════════ -->
    <footer class="footer" id="sec-footer">

      <div class="footer-content" data-aos="fade-down" data-aos-duration="1200">
        <!-- León central arriba -->
    </footer>

 

  <!-- ── AUDIO ── -->
  <audio id="bg-music" loop preload="auto">
    <source src="cancion.mp4" type="audio/mp4">
    <source src="cancion.mp3" type="audio/mpeg">
  </audio>

  <!-- ── BOTÓN FLOTANTE PAUSA/PLAY ── -->
  <button id="musicToggle" onclick="toggleMusic()" aria-label="Pausar/reproducir música">
    <!-- Icono PAUSE -->
    <svg class="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="3" width="4" height="18" rx="1"/>
      <rect x="15" y="3" width="4" height="18" rx="1"/>
    </svg>
    <!-- Icono PLAY -->
    <svg class="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 3.75v16.5L20 12 6 3.75z"/>
    </svg>
  </button>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // ── AOS con mirror=true para animaciones al volver a subir ──
    AOS.init({
      duration: 1000,
      easing: 'ease-in-out',
      once: false,
      mirror: true,
      offset: 80
    });

    

    // ── Contador regresivo ──
    const fechaEvento = new Date('May 16, 2026 15:00:00').getTime();
    function actualizarContador() {
      const dist = fechaEvento - Date.now();
      const safe = Math.max(0, dist);
      document.getElementById('dias').textContent     = String(Math.floor(safe / 86400000)).padStart(2,'0');
      document.getElementById('horas').textContent    = String(Math.floor((safe % 86400000) / 3600000)).padStart(2,'0');
      document.getElementById('minutos').textContent  = String(Math.floor((safe % 3600000) / 60000)).padStart(2,'0');
      document.getElementById('segundos').textContent = String(Math.floor((safe % 60000) / 1000)).padStart(2,'0');
    }
    setInterval(actualizarContador, 1000);
    actualizarContador();

    // ── Bloquear scroll mientras el cover está activo ──
    document.body.classList.add('cover-active');

    // ── COVER CLICK → SHOW CONTENT + INICIAR MÚSICA ──
    const cover   = document.getElementById('cover');
    const content = document.getElementById('content');

    cover.addEventListener('click', openInvitation);
    cover.addEventListener('touchend', openInvitation, {passive: true});

    function openInvitation() {
      document.body.classList.remove('cover-active');
      cover.style.display = 'none';
      content.style.display = 'block';
      content.offsetHeight; // force reflow
      content.classList.add('visible');
      startMusic();
      // Reinicializar AOS para que detecte las secciones recién visibles
      setTimeout(() => { AOS.refresh(); }, 100);
    }

    // ── MÚSICA ──
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('musicToggle');
    let isPlaying = false;

    function startMusic() {
      audio.volume = 0.75;
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          isPlaying = true;
          musicBtn.style.display = 'flex';
          // Si fue pausado manualmente, no re-arranca solo
        }).catch(() => {
          isPlaying = false;
          musicBtn.style.display = 'flex';
          musicBtn.classList.add('paused');
        });
      }
    }

    // Cuando la canción termina (por si acaso loop falla), vuelve a sonar
    audio.addEventListener('ended', () => {
      audio.currentTime = 0;
      audio.play().then(() => { isPlaying = true; musicBtn.classList.remove('paused'); });
    });

    function toggleMusic() {
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        musicBtn.classList.add('paused');
      } else {
        audio.play().then(() => {
          isPlaying = true;
          musicBtn.classList.remove('paused');
        });
      }
    }

    // ── TRANSICIONES FADE ENTRE SECCIONES ──
    const sectionFadeStyle = document.createElement('style');
    sectionFadeStyle.textContent = `
      .section-fade {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.8s ease, transform 0.8s ease;
      }
      .section-fade.in-view {
        opacity: 1;
        transform: translateY(0);
      }
    `;
    document.head.appendChild(sectionFadeStyle);

    function initSectionFades() {
      const targets = document.querySelectorAll('#content section, #content footer');
      const fadeObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('in-view');
          } else {
            e.target.classList.remove('in-view');
          }
        });
      }, { threshold: 0.08 });

      targets.forEach(el => {
        el.classList.add('section-fade');
        fadeObs.observe(el);
      });
    }

    setTimeout(initSectionFades, 200);

    // ── Hojas visibles con scroll (IntersectionObserver) ──
    const leafIds = ['l1a','l1b','l3a','l3b',
                     'l4c','l5a','l5b','l6a','l6b'];
    const leafObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        } else {
          e.target.classList.remove('visible');
        }
      });
    }, { threshold: 0.05 });

    leafIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) leafObs.observe(el);
    });

    // ── Adornos de esquina visibles con scroll ──
    const cornerIds = [
      'c1-tl','c1-tr','c1-bl','c1-br',
      'c2-tl','c2-tr','c2-bl','c2-br',
      'c3-tl','c3-tr','c3-bl','c3-br',
      'c4-tl','c4-tr','c4-bl','c4-br',
      'c5-tl','c5-tr','c5-bl','c5-br',
      'c6-tl','c6-tr','c6-bl','c6-br',
      'c7-tl','c7-tr'
    ];
    const cornerObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        } else {
          e.target.classList.remove('visible');
        }
      });
    }, { threshold: 0.05 });

    cornerIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) cornerObs.observe(el);
    });

    // ── Smooth scroll ──
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const t = document.querySelector(a.getAttribute('href'));
        if (t) t.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
